<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wireframe Mobile - Registro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            max-width: 414px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* Header */
        .header {
            background-color: #fff;
            border-bottom: 1px solid #ddd;
            padding: 10px 16px;
            flex-shrink: 0;
        }
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            width: 80px;
            height: 28px;
            background-color: #999;
            border-radius: 4px;
        }
        
        /* Main Content */
        .main-content {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        
        /* Progress Indicator */
        .progress-indicator {
            margin-bottom: 16px;
            flex-shrink: 0;
        }
        .progress-steps {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .step-number {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: #999;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
        }
        .step-number.inactive {
            background-color: #ddd;
            color: #666;
        }
        .progress-line {
            width: 28px;
            height: 3px;
            background-color: #ddd;
        }
        
        /* Register Card */
        .register-card {
            background-color: #fff;
            border-radius: 8px;
            border: 1px solid #ddd;
            padding: 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        /* Form */
        .form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex: 1;
        }
        .form-row {
            display: flex;
            gap: 8px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            flex: 1;
        }
        .form-label {
            margin-bottom: 6px;
            font-size: 12px;
            font-weight: 500;
        }
        .form-input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 13px;
            background-color: #fafafa;
        }
        .form-select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 13px;
            background-color: #fafafa;
        }
        
        /* Buttons */
        .form-buttons {
            margin-top: auto;
            padding-top: 12px;
        }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 500;
        }
        .btn-primary {
            background-color: #999;
            color: #fff;
        }
        
        /* Footer Text */
        .footer-text {
            margin-top: 12px;
            text-align: center;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <div class="logo"></div>
        </div>
    </header>

    <!-- Main Content - Step 1 -->
    <main class="main-content">
        <!-- Progress Indicator -->
        <div class="progress-indicator">
            <div class="progress-steps">
                <div class="step-number">1</div>
                <div class="progress-line"></div>
                <div class="step-number inactive">2</div>
            </div>
        </div>
        
        <!-- Register Card - Step 1 -->
        <div class="register-card">
            <form class="form">
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Nombre</label>
                        <input type="text" class="form-input" placeholder="Juan" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Apellido</label>
                        <input type="text" class="form-input" placeholder="Pérez" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Correo Electrónico</label>
                    <input type="email" class="form-input" placeholder="tu@email.com" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Dirección</label>
                    <input type="text" class="form-input" placeholder="Calle 123" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">País</label>
                    <select class="form-select" required>
                        <option>Selecciona un país</option>
                        <option>Argentina</option>
                        <option>Uruguay</option>
                        <option>Chile</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Contraseña</label>
                    <input type="password" class="form-input" placeholder="••••••••" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Confirmar Contraseña</label>
                    <input type="password" class="form-input" placeholder="••••••••" required>
                </div>
                
                <div class="form-buttons">
                    <button type="submit" class="btn btn-primary">Continuar</button>
                    <div class="footer-text">
                        ¿Ya tienes cuenta? <a href="#" style="text-decoration: underline;">Inicia sesión</a>
                    </div>
                </div>
            </form>
        </div>
    </main>
</body>
</html>
