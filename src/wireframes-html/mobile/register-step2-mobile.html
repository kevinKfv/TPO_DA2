<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wireframe Mobile - Registro Paso 2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            max-width: 414px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* Header */
        .header {
            background-color: #fff;
            border-bottom: 1px solid #ddd;
            padding: 10px 16px;
            flex-shrink: 0;
        }
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            width: 80px;
            height: 28px;
            background-color: #999;
            border-radius: 4px;
        }
        
        /* Main Content */
        .main-content {
            flex: 1;
            padding: 16px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        
        /* Progress Indicator */
        .progress-indicator {
            margin-bottom: 16px;
            flex-shrink: 0;
        }
        .progress-steps {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .step-number {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: #999;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
        }
        .progress-line {
            width: 28px;
            height: 3px;
            background-color: #999;
        }
        
        /* Register Card */
        .register-card {
            background-color: #fff;
            border-radius: 8px;
            border: 1px solid #ddd;
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        
        /* Form */
        .form {
            display: flex;
            flex-direction: column;
            gap: 20px;
            flex: 1;
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        .form-label {
            margin-bottom: 10px;
            font-size: 13px;
            font-weight: 600;
        }
        
        /* Upload Button */
        .upload-btn-wrapper {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .upload-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px;
            background-color: #999;
            color: #fff;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }
        .upload-icon {
            width: 20px;
            height: 20px;
            background-color: #fff;
            border-radius: 50%;
        }
        
        /* File Name Display */
        .file-display {
            display: none; /* Mostrar cuando se carga archivo */
            padding: 10px 12px;
            background-color: #f0f0f0;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 12px;
            color: #666;
        }
        .file-display.active {
            display: block;
        }
        
        /* Buttons */
        .form-buttons {
            display: flex;
            gap: 8px;
            margin-top: auto;
        }
        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 500;
        }
        .btn-secondary {
            background-color: #ddd;
            color: #333;
        }
        .btn-primary {
            background-color: #999;
            color: #fff;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <div class="logo"></div>
        </div>
    </header>

    <!-- Main Content - Step 2 -->
    <main class="main-content">
        <!-- Progress Indicator -->
        <div class="progress-indicator">
            <div class="progress-steps">
                <div class="step-number">1</div>
                <div class="progress-line"></div>
                <div class="step-number">2</div>
            </div>
        </div>
        
        <!-- Register Card - Step 2 -->
        <div class="register-card">
            <form class="form">
                <div class="form-group">
                    <label class="form-label">Documento de Identidad (Frente)</label>
                    <div class="upload-btn-wrapper">
                        <div class="upload-btn">
                            <div class="upload-icon"></div>
                            Cargar Frente
                        </div>
                        <!-- Mostrar cuando se carga archivo -->
                        <!-- <div class="file-display active">📄 documento_frente.jpg</div> -->
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Documento de Identidad (Dorso)</label>
                    <div class="upload-btn-wrapper">
                        <div class="upload-btn">
                            <div class="upload-icon"></div>
                            Cargar Dorso
                        </div>
                        <!-- Mostrar cuando se carga archivo -->
                        <!-- <div class="file-display active">📄 documento_dorso.jpg</div> -->
                    </div>
                </div>
                
                <div class="form-buttons">
                    <button type="button" class="btn btn-secondary">Volver</button>
                    <button type="submit" class="btn btn-primary">Completar</button>
                </div>
            </form>
        </div>
    </main>
</body>
</html>
