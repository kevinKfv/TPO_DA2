<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Auction Wireframe - HAMMER Subastas</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      min-height: 100vh;
      padding-bottom: 100px;
    }
    
    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 1rem;
    }
    
    /* Header */
    .header {
      border-bottom: 2px solid black;
      background: white;
    }
    
    .header-content {
      padding: 1rem 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .back-section {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .back-icon {
      width: 24px;
      height: 24px;
      background: #999;
    }
    
    .back-text {
      width: 80px;
      height: 16px;
      background: #999;
    }
    
    .live-section {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .live-indicator {
      width: 12px;
      height: 12px;
      background: black;
      border-radius: 50%;
    }
    
    .live-badge {
      width: 80px;
      height: 24px;
      border: 2px solid black;
      padding: 0 0.5rem;
    }
    
    /* Main Content */
    .main-content {
      padding: 1.5rem 0;
    }
    
    .content-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 1.5rem;
    }
    
    /* Product Section */
    .product-section {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    
    .product-card {
      background: white;
      border: 2px solid black;
    }
    
    .product-content {
      display: flex;
    }
    
    .product-image {
      width: 33.333%;
      height: 256px;
      background: #ccc;
      border-right: 2px solid black;
    }
    
    .product-details {
      flex: 1;
      padding: 1.5rem;
    }
    
    .lot-number {
      width: 80px;
      height: 16px;
      background: #999;
      margin-bottom: 0.5rem;
    }
    
    .product-title {
      width: 83.333%;
      height: 32px;
      background: black;
      margin-bottom: 1rem;
    }
    
    .product-description {
      margin-bottom: 1.5rem;
    }
    
    .desc-line-1 {
      width: 100%;
      height: 16px;
      background: #ccc;
      margin-bottom: 0.5rem;
    }
    
    .desc-line-2 {
      width: 80%;
      height: 16px;
      background: #ccc;
    }
    
    .product-info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    
    .info-item-label {
      width: 96px;
      height: 16px;
      background: #999;
      margin-bottom: 0.5rem;
    }
    
    .info-item-value {
      width: 128px;
      height: 24px;
      background: black;
    }
    
    /* Current Bid Display */
    .current-bid-display {
      background: #1a1a1a;
      border: 2px solid black;
      padding: 1rem;
    }
    
    .bid-display-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .bid-label {
      width: 96px;
      height: 12px;
      background: #999;
      margin-bottom: 0.5rem;
    }
    
    .bid-amount {
      width: 160px;
      height: 40px;
      background: white;
    }
    
    .bid-icon {
      width: 32px;
      height: 32px;
      background: white;
    }
    
    /* Bidding Section */
    .bidding-section {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    
    .bid-form {
      background: white;
      border: 2px solid black;
      padding: 1.5rem;
    }
    
    .bid-form-title {
      width: 128px;
      height: 24px;
      background: black;
      margin-bottom: 1.5rem;
    }
    
    .info-alert {
      border: 2px solid #999;
      background: #f3f4f6;
      padding: 0.75rem;
      margin-bottom: 1rem;
    }
    
    .alert-content {
      display: flex;
      gap: 0.5rem;
    }
    
    .alert-icon {
      width: 16px;
      height: 16px;
      background: #999;
      flex-shrink: 0;
    }
    
    .alert-text {
      flex: 1;
    }
    
    .alert-line-1 {
      width: 100%;
      height: 12px;
      background: #999;
      margin-bottom: 0.5rem;
    }
    
    .alert-line-2 {
      width: 75%;
      height: 12px;
      background: #999;
    }
    
    .bid-amount-section {
      margin-bottom: 1rem;
    }
    
    .amount-label {
      width: 192px;
      height: 20px;
      background: black;
      margin-bottom: 0.75rem;
    }
    
    .slider-container {
      position: relative;
      margin-bottom: 0.5rem;
    }
    
    .slider-track {
      width: 100%;
      height: 8px;
      background: #ccc;
      border-radius: 4px;
    }
    
    .slider-fill {
      position: absolute;
      top: 0;
      left: 0;
      width: 50%;
      height: 8px;
      background: black;
      border-radius: 4px;
    }
    
    .slider-thumb {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 16px;
      height: 16px;
      margin-top: -8px;
      margin-left: -8px;
      background: black;
      border: 2px solid white;
      border-radius: 50%;
    }
    
    .slider-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 0.5rem;
    }
    
    .slider-label {
      width: 96px;
      height: 12px;
      background: #999;
    }
    
    .submit-bid-btn {
      width: 100%;
      height: 48px;
      background: black;
      margin-bottom: 1rem;
    }
    
    .quick-bid-buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.5rem;
    }
    
    .quick-bid-btn {
      height: 40px;
      border: 2px solid black;
    }
    
    /* Sticky Bottom Bar (Mobile) */
    .sticky-bottom {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      border-top: 2px solid black;
      padding: 1rem;
    }
    
    .bottom-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }
    
    .bottom-bid-info-label {
      width: 96px;
      height: 12px;
      background: #999;
      margin-bottom: 0.25rem;
    }
    
    .bottom-bid-amount {
      width: 128px;
      height: 24px;
      background: black;
    }
    
    .bottom-bid-btn {
      width: 96px;
      height: 40px;
      background: black;
    }
    
    @media (max-width: 1024px) {
      .content-grid {
        grid-template-columns: 1fr;
      }
      
      .sticky-bottom {
        display: block;
      }
      
      body {
        padding-bottom: 100px;
      }
    }
    
    @media (min-width: 1025px) {
      .sticky-bottom {
        display: none;
      }
      
      body {
        padding-bottom: 0;
      }
    }
    
    @media (max-width: 768px) {
      .product-content {
        flex-direction: column;
      }
      
      .product-image {
        width: 100%;
        border-right: none;
        border-bottom: 2px solid black;
      }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="container">
      <div class="header-content">
        <div class="back-section">
          <div class="back-icon"></div>
          <div class="back-text"></div>
        </div>
        <div class="live-section">
          <div class="live-indicator"></div>
          <div class="live-badge"></div>
        </div>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main-content">
    <div class="container">
      <div class="content-grid">
        <!-- Left Column - Product Info -->
        <div class="product-section">
          <div class="product-card">
            <div class="product-content">
              <!-- Product Image -->
              <div class="product-image"></div>

              <!-- Product Details -->
              <div class="product-details">
                <div class="lot-number"></div>
                <div class="product-title"></div>
                <div class="product-description">
                  <div class="desc-line-1"></div>
                  <div class="desc-line-2"></div>
                </div>

                <div class="product-info-grid">
                  <div>
                    <div class="info-item-label"></div>
                    <div class="info-item-value"></div>
                  </div>
                  <div>
                    <div class="info-item-label"></div>
                    <div class="info-item-value"></div>
                  </div>
                </div>

                <!-- Current Bid Display -->
                <div class="current-bid-display">
                  <div class="bid-display-content">
                    <div>
                      <div class="bid-label"></div>
                      <div class="bid-amount"></div>
                    </div>
                    <div class="bid-icon"></div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Right Column - Bidding -->
        <div class="bidding-section">
          <div class="bid-form">
            <div class="bid-form-title"></div>

            <!-- Info Alert -->
            <div class="info-alert">
              <div class="alert-content">
                <div class="alert-icon"></div>
                <div class="alert-text">
                  <div class="alert-line-1"></div>
                  <div class="alert-line-2"></div>
                </div>
              </div>
            </div>

            <!-- Bid Amount -->
            <div class="bid-amount-section">
              <div class="amount-label"></div>

              <!-- Slider -->
              <div class="slider-container">
                <div class="slider-track"></div>
                <div class="slider-fill"></div>
                <div class="slider-thumb"></div>
              </div>

              <!-- Min/Max Labels -->
              <div class="slider-labels">
                <div class="slider-label"></div>
                <div class="slider-label"></div>
              </div>
            </div>

            <!-- Submit Button -->
            <div class="submit-bid-btn"></div>

            <!-- Quick Bid Buttons -->
            <div class="quick-bid-buttons">
              <div class="quick-bid-btn"></div>
              <div class="quick-bid-btn"></div>
              <div class="quick-bid-btn"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Sticky Bottom Info Bar (Mobile) -->
  <div class="sticky-bottom">
    <div class="bottom-content">
      <div>
        <div class="bottom-bid-info-label"></div>
        <div class="bottom-bid-amount"></div>
      </div>
      <div class="bottom-bid-btn"></div>
    </div>
  </div>
</body>
</html>
